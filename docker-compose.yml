services:
  db:
    image: postgres:16
    container_name: test-exchange-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
    container_name: test-exchange-app
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs

volumes:
  postgres_data:
